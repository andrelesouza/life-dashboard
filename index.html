<style>body{margin:0}img{display:block;max-width:100%}</style><script>(function(){function S(){var d={};Object.defineProperties(this,{getItem:{value:function(k){return d.hasOwnProperty(k)?d[k]:null}},setItem:{value:function(k,v){var o=d[k]||null;d[k]=String(v);this.length=Object.keys(d).length}},removeItem:{value:function(k){delete d[k];this.length=Object.keys(d).length}},clear:{value:function(){d={};this.length=0}},key:{value:function(i){return Object.keys(d)[i]||null}},length:{value:0,writable:true}})}try{window.localStorage}catch(e){Object.defineProperty(window,'localStorage',{value:new S(),configurable:true})}try{window.sessionStorage}catch(e){Object.defineProperty(window,'sessionStorage',{value:new S(),configurable:true})}var hp=history.pushState;history.pushState=function(){try{hp.apply(history,arguments)}catch(e){}};var hr=history.replaceState;history.replaceState=function(){try{hr.apply(history,arguments)}catch(e){}};try{document.cookie}catch(e){Object.defineProperty(document,'cookie',{get:function(){return ''},set:function(){},configurable:true})}})();</script><script>document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;e.preventDefault();var id=a.getAttribute('href').slice(1);if(!id)return;var el=document.getElementById(id);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}try{history.replaceState(null,'','#'+id)}catch(e){}});</script><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Life Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin: 28px 0 14px 0;
    border-left: 3px solid #60a5fa;
    padding-left: 10px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #9ca3af;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .grid-container {
    overflow-x: auto;
    max-width: 100%;
    margin: 0 auto;
    padding-bottom: 10px;
  }
  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-right: 4px;
  }
  .day-label {
    height: 13px;
    width: 26px;
    font-size: 9px;
    color: #4b5563;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
  }
  .columns-area {
    display: flex;
    flex-direction: row;
    gap: 3px;
  }
  .week-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
  }
  .dot:hover {
    transform: scale(1.9);
    z-index: 10;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }
  .dot-regular { background: #3b82f6; }
  .dot-weekend { background: #facc15; }
  .dot-holiday { background: #7dd3fc; }
  .dot-today { background: #ef4444; animation: pulse 2s infinite; }
  .dot-past { opacity: 0.35; }
  .dot-empty { background: transparent; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  }
  .tooltip {
    display: none;
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: #f3f4f6;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    border: 1px solid #374151;
  }
  .dot:hover .tooltip { display: block; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    max-width: 700px;
    margin: 0 auto;
  }
  .stat-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-value.life {
    background: linear-gradient(135deg, #f97316, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: #1f2937;
    border-radius: 5px;
    margin: 16px auto 6px;
    max-width: 700px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s ease;
  }
  .progress-label {
    text-align: center;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 8px;
  }
  .life-section {
    background: linear-gradient(135deg, #1a0a00, #0a0a0f);
    border: 1px solid #7c2d12;
    border-radius: 16px;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #374151;
    font-size: 11px;
  }
</style>
</head>
<body>
<h1>🗓️ 2026 Life Dashboard</h1>
<p class="subtitle" id="todayLabel"></p>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;opacity:0.35"></div> Past Day</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Future Weekday</div>
  <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> Weekend (Sat/Sun)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc"></div> US Holiday</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Today</div>
</div>
<div class="grid-container" id="gridContainer"></div>
<div class="section-title">📊 Year Progress</div>
<div class="progress-bar-bg"><div class="progress-bar-fill" id="yearBar" style="background:linear-gradient(90deg,#60a5fa,#a78bfa)"></div></div>
<p class="progress-label" id="yearBarLabel"></p>
<div class="stats-grid" id="yearStats"></div>
<div class="section-title">🧡 Life Dashboard</div>
<div class="life-section">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="lifeBar" style="background:linear-gradient(90deg,#f97316,#ef4444)"></div></div>
  <p class="progress-label" id="lifeBarLabel"></p>
  <div class="stats-grid" id="lifeStats"></div>
</div>
<footer>Built with ❤️ — Make every dot count.</footer>
<script>
const YEAR=2026,BIRTH_DATE=new Date(1981,0,1),TARGET_AGE=80,TARGET_DATE=new Date(2061,0,1);
const NOW=new Date(),TODAY=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());
const TODAY_STR=TODAY.toISOString().slice(0,10);

function getUSHolidays(y){
  const h={};
  function add(m,d,n){h[new Date(y,m-1,d).toISOString().slice(0,10)]=n}
  function nth(m,dow,n){let d=new Date(y,m-1,1),c=0;while(c<n){if(d.getDay()===dow)c++;if(c<n)d.setDate(d.getDate()+1)}return d}
  function last(m,dow){let d=new Date(y,m,0);while(d.getDay()!==dow)d.setDate(d.getDate()-1);return d}
  add(1,1,"New Year's Day");
  let d;
  d=nth(1,1,3);h[d.toISOString().slice(0,10)]="MLK Day";
  d=nth(2,1,3);h[d.toISOString().slice(0,10)]="Presidents' Day";
  d=last(5,1);h[d.toISOString().slice(0,10)]="Memorial Day";
  add(6,19,"Juneteenth");
  add(7,3,"Independence Day (Observed)");
  d=nth(9,1,1);h[d.toISOString().slice(0,10)]="Labor Day";
  d=nth(10,1,2);h[d.toISOString().slice(0,10)]="Columbus Day";
  add(11,11,"Veterans Day");
  d=nth(11,4,4);h[d.toISOString().slice(0,10)]="Thanksgiving";
  add(12,25,"Christmas Day");
  return h;
}
const HOLIDAYS=getUSHolidays(YEAR);
const jan1=new Date(YEAR,0,1),dec31=new Date(YEAR,11,31);
function jsDayToMon(d){return d===0?6:d-1}

let weeks=[];
let d2=new Date(jan1),currentWeek=new Array(7).fill(null);
while(true){
  let idx=jsDayToMon(d2.getDay());
  currentWeek[idx]=new Date(d2);
  if(idx===6){weeks.push(currentWeek);currentWeek=new Array(7).fill(null)}
  d2.setDate(d2.getDate()+1);
  if(d2.getFullYear()>YEAR){if(currentWeek.some(x=>x!==null))weeks.push(currentWeek);break}
}

const container=document.getElementById('gridContainer');
const gridBody=document.createElement('div');
gridBody.style.cssText='display:flex;flex-direction:row;gap:0;margin:0 auto;width:fit-content';

const dayLabels=document.createElement('div');
dayLabels.className='day-labels';
['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(n=>{
  const l=document.createElement('div');l.className='day-label';l.textContent=n;dayLabels.appendChild(l);
});
gridBody.appendChild(dayLabels);

const monthStarts={},monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const colsArea=document.createElement('div');colsArea.className='columns-area';

weeks.forEach((week,wi)=>{
  const col=document.createElement('div');col.className='week-col';
  week.forEach((date,di)=>{
    const dot=document.createElement('div');dot.className='dot';
    if(!date){dot.classList.add('dot-empty')}else{
      const ds=date.toISOString().slice(0,10),dow=date.getDay(),isWE=dow===0||dow===6;
      const isH=HOLIDAYS[ds],isT=ds===TODAY_STR,isP=date<TODAY;
      if(date.getDate()===1)monthStarts[wi]=monthNames[date.getMonth()];
      if(isT)dot.classList.add('dot-today');
      else if(isH){dot.classList.add('dot-holiday');if(isP)dot.classList.add('dot-past')}
      else if(isWE){dot.classList.add('dot-weekend');if(isP)dot.classList.add('dot-past')}
      else{dot.classList.add('dot-regular');if(isP)dot.classList.add('dot-past')}
      const tip=document.createElement('div');tip.className='tooltip';
      let t=date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      if(isH)t+=' — '+HOLIDAYS[ds];if(isT)t+=' ★ TODAY';
      tip.textContent=t;dot.appendChild(tip);
    }
    col.appendChild(dot);
  });
  colsArea.appendChild(col);
});
gridBody.appendChild(colsArea);

const monthRow=document.createElement('div');
monthRow.style.cssText='display:flex;margin-left:30px;margin-bottom:4px;gap:3px;width:fit-content';
let lastM='';
weeks.forEach((w,wi)=>{
  const c=document.createElement('div');
  c.style.cssText='width:13px;font-size:10px;color:#6b7280;text-align:left;overflow:visible;white-space:nowrap;position:relative';
  if(monthStarts[wi]&&monthStarts[wi]!==lastM){c.textContent=monthStarts[wi];lastM=monthStarts[wi]}
  monthRow.appendChild(c);
});
container.appendChild(monthRow);container.appendChild(gridBody);

// Stats
const totalDays=365,dayOfYear=Math.min(Math.max(Math.floor((TODAY-jan1)/864e5)+1,0),totalDays);
const pctYear=((dayOfYear/totalDays)*100).toFixed(1),weeksToGo=Math.ceil((totalDays-dayOfYear)/7);
const hDates=Object.keys(HOLIDAYS).sort();
let hPassed=0,hToGo=0,dNext=null,nName=null;
hDates.forEach(hd=>{const dt=new Date(hd+'T00:00:00');if(dt<TODAY)hPassed++;else{hToGo++;if(dNext===null){dNext=Math.ceil((dt-TODAY)/864e5);nName=HOLIDAYS[hd]}}});
let sP=0,sG=0,uP=0,uG=0;
for(let m=0;m<12;m++)for(let dd=1;dd<=31;dd++){const dt=new Date(YEAR,m,dd);if(dt.getMonth()!==m)break;if(dt.getDay()===6){if(dt<TODAY)sP++;else sG++}if(dt.getDay()===0){if(dt<TODAY)uP++;else uG++}}

document.getElementById('todayLabel').textContent=TODAY.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' — Day '+dayOfYear+' of '+totalDays;
document.getElementById('yearBar').style.width=pctYear+'%';
document.getElementById('yearBarLabel').textContent=pctYear+'% of 2026 completed';

const ys=document.getElementById('yearStats');
[[pctYear+'%','Year Passed'],[weeksToGo,'Weeks to Go'],[hPassed,'Holidays Passed'],[hToGo,'Holidays Remaining'],
[dNext!==null?dNext:'—',dNext!==null?'Days to '+nName:'Days to Next Holiday'],
[sP+uP,'Weekend Days Passed'],[sG+uG,'Weekend Days to Go'],[sP+' / '+sG,'Saturdays (Past / Left)'],[uP+' / '+uG,'Sundays (Past / Left)']
].forEach(([v,l])=>{ys.innerHTML+='<div class="stat-card"><div class="stat-value">'+v+'</div><div class="stat-label">'+l+'</div></div>'});

// Life
const tLD=Math.floor((TARGET_DATE-BIRTH_DATE)/864e5),dL=Math.floor((TODAY-BIRTH_DATE)/864e5),dLeft=tLD-dL;
const wLeft=Math.floor(dLeft/7),pL=((dL/tLD)*100).toFixed(1),pR=(100-parseFloat(pL)).toFixed(1);
const wL=Math.floor(dL/7),cAge=Math.floor(dL/365.25);
document.getElementById('lifeBar').style.width=pL+'%';
document.getElementById('lifeBarLabel').textContent=pL+'% of life lived (targeting age '+TARGET_AGE+')';
const ls=document.getElementById('lifeStats');
[[cAge,'Current Age'],[dLeft.toLocaleString(),'Days Left to Live'],[wLeft.toLocaleString(),'Weeks Left to Live'],
[pR+'%','Life Remaining'],[dL.toLocaleString(),'Days Lived'],[wL.toLocaleString(),'Weeks Lived']
].forEach(([v,l])=>{ls.innerHTML+='<div class="stat-card"><div class="stat-value life">'+v+'</div><div class="stat-label">'+l+'</div></div>'});
</script>
</body>
</html>
